<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FBA 总费用与尺寸优化工具</title>
  <style>
    :root{
      --paper:#f7f5ef;
      --panel:#ffffff;
      --ink:#24211d;
      --ink-soft:#706b62;
      --ink-faint:#9a948a;
      --line:#e6e0d6;
      --line-strong:#d7cec0;
      --hover:#7a5b36;
      --accent:#111827;
      --good:#127a54;
      --warn:#9a5b00;
      --bad:#a43b3b;
    }
    *{box-sizing:border-box}
    html{background:transparent}
    body{
      margin:0;
      background:var(--paper);
      color:var(--ink);
      font:15px/1.65 Inter,"Noto Sans SC",system-ui,-apple-system,"Microsoft YaHei",sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    main{max-width:1120px;margin:auto;padding:22px 18px 42px}
    .intro{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line)}
    .kicker{margin:0 0 8px;color:var(--ink-soft);font-size:12px;font-weight:650;letter-spacing:.14em;text-transform:uppercase}
    .intro h1{margin:0;font-size:28px;font-weight:680;letter-spacing:.01em;line-height:1.2}
    .intro p,.hint{margin:8px 0 0;color:var(--ink-soft)}
    .grid{display:grid;grid-template-columns:minmax(320px,380px) 1fr;gap:18px;align-items:start}
    .card{background:var(--panel);border:1px solid var(--line-strong);border-radius:10px;padding:18px}
    .card h2{font-size:16px;font-weight:650;margin:0 0 14px;letter-spacing:.01em}
    .form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .full{grid-column:1/-1}
    label{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:5px}
    input,select{
      width:100%;
      background:#fff;
      color:var(--ink);
      border:1px solid var(--line-strong);
      border-radius:8px;
      padding:9px 10px;
      font:inherit;
      outline:none;
      transition:border-color .16s ease,box-shadow .16s ease;
    }
    input:focus,select:focus{border-color:var(--hover);box-shadow:0 0 0 3px rgba(122,91,54,.12)}
    button{
      width:100%;
      border:1px solid var(--accent);
      border-radius:8px;
      padding:11px 12px;
      background:var(--accent);
      color:white;
      font-weight:680;
      font-size:14px;
      cursor:pointer;
      margin-top:4px;
      transition:background .16s ease,border-color .16s ease,opacity .16s ease;
    }
    button:hover{background:#2f333a;border-color:#2f333a}
    button:disabled{opacity:.62;cursor:wait}
    code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.88em;color:var(--ink);background:#f0ebe2;border:1px solid var(--line);border-radius:4px;padding:.12em .34em}
    .result{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .metric{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fbfaf7}
    .metric .label{color:var(--ink-soft);font-size:12px;font-weight:600}
    .metric .value{font-size:22px;font-weight:720;margin-top:2px;font-variant-numeric:tabular-nums}
    .metric.total{border-color:var(--accent);background:#f2efe8}
    .metric.total .value{color:var(--accent)}
    .detail{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}
    .rows{display:grid;grid-template-columns:repeat(2,1fr);gap:0 18px}
    .row{display:flex;justify-content:space-between;gap:14px;border-bottom:1px solid var(--line);padding:8px 0;color:var(--ink-soft)}
    .row b{color:var(--ink);text-align:right;font-weight:650;font-variant-numeric:tabular-nums}
    .tier{display:inline-block;margin-bottom:6px;padding:3px 8px;border-radius:999px;font-weight:650;font-size:12px;background:#f0ebe2;color:var(--hover);border:1px solid var(--line-strong)}
    .notice{border-left:3px solid var(--warn);background:#fff8ea;padding:11px 13px;border-radius:6px;margin-top:14px;color:#4f3b1d}
    .notice.good{border-color:var(--good);background:#eef8f3;color:#183f31}
    .notice.bad{border-color:var(--bad);background:#fff1f1;color:#623030}
    .notice ul{margin:7px 0 0;padding-left:19px}
    .source{margin-top:18px;color:var(--ink-faint);font-size:12px}
    .source a{color:var(--hover);text-underline-offset:.25em}
    @media(max-width:880px){main{padding:18px 14px 32px}.grid{grid-template-columns:1fr}.result{grid-template-columns:repeat(2,1fr)}.rows{grid-template-columns:1fr}}
    @media(max-width:520px){.form,.result{grid-template-columns:1fr}.intro h1{font-size:24px}.card{padding:15px}}
  </style>
</head>
<body>
<main>
  <section class="intro"><p class="kicker">FBA COST TOOL</p><h1>FBA 总费用与尺寸优化工具</h1><p>海运按实重与体积重的较高者计费；FBA 配送费、配置费和尺寸建议由同一计算服务统一计算。</p></section>
  <div class="grid">
    <section class="card"><h2>输入参数（单件包装后）</h2>
      <div class="form">
        <div><label>长</label><input id="length" type="number" min="0" step="0.01" value="17"></div><div><label>宽</label><input id="width" type="number" min="0" step="0.01" value="13"></div>
        <div><label>高</label><input id="height" type="number" min="0" step="0.01" value="7"></div><div><label>尺寸单位</label><select id="dimension_unit"><option value="in">英寸（in）</option><option value="cm">厘米（cm）</option></select></div>
        <div><label>实际重量</label><input id="weight" type="number" min="0" step="0.01" value="3"></div><div><label>重量单位</label><select id="weight_unit"><option value="lb">磅（lb）</option><option value="kg">千克（kg）</option></select></div>
        <div class="full"><label>海运模板</label><select id="sea_freight_template_id"><option value="202607-lianyu-express">202607-联宇-快船｜GEU2｜$1.42/kg｜开船约18天签收</option><option value="202607-lianyu-oa">202607-联宇-OA船司｜GEU2｜$1.33/kg｜开船约22天签收</option></select></div>
        <div><label>售价（USD，仅决定费率档）</label><input id="price" type="number" min="0" step="0.01" value="29.99"></div><div><label>配送费季节</label><select id="season"><option value="regular">非旺季</option><option value="peak">旺季（10/15–12/14）</option></select></div>
        <div class="full"><label>入库方案</label><select id="placement"><option value="single">单点入仓</option><option value="split">部分货件拆分</option><option value="optimized">亚马逊优化货件拆分</option></select></div>
        <div class="full"><button id="calc">计算费用并优化尺寸</button></div>
      </div>
      <p class="hint">海运体积重公式：长 × 宽 × 高（cm）÷ 6000；计费重取体积重与实重的较高者。可在 MCP 调用中用 <code>sea_rate_per_kg</code> 覆盖模板报价。</p>
    </section>
    <section class="card"><h2>计算结果</h2><div id="output"><p class="hint">正在计算…</p></div></section>
  </div>
  <p class="source">费率来源：<a href="https://ccn1l53zhme9.feishu.cn/docx/B0B2dKd7ioYnUhxMW5icRBJynIh" target="_blank">《亚马逊 FBA 配送费+配置费用+海运费计算》</a>。特大件处理费及未列出的配置费，请以 Amazon 实际账单复核。</p>
</main>
<script>
const $=id=>document.getElementById(id), money=n=>n==null?'待核对':'$'+Number(n).toFixed(2), num=id=>Number($(id).value);
let rpcId=0;
function priceBand(price){return price<10?'under_10':price<=50?'10_to_50':'over_50'}
function args(){return {length:num('length'),width:num('width'),height:num('height'),weight:num('weight'),dimension_unit:$('dimension_unit').value,weight_unit:$('weight_unit').value,season:$('season').value,price_band:priceBand(num('price')),placement:$('placement').value,sea_freight_template_id:$('sea_freight_template_id').value}}
function parseRpc(raw){try{return JSON.parse(raw)}catch{const lines=raw.split(/\r?\n/).filter(line=>line.startsWith('data:')).map(line=>line.slice(5).trim()).filter(Boolean);return JSON.parse(lines.at(-1))}}
async function invoke(name,arguments_){const response=await fetch('/mcp',{method:'POST',headers:{'content-type':'application/json',accept:'application/json, text/event-stream','MCP-Protocol-Version':'2025-03-26'},body:JSON.stringify({jsonrpc:'2.0',id:++rpcId,method:'tools/call',params:{name,arguments:arguments_}})});const rpc=parseRpc(await response.text());if(!response.ok||rpc.error)throw Error(rpc.error?.message||'MCP 调用失败');return JSON.parse(rpc.result.content[0].text)}
function render(cost,optimization){const p=cost.product,t=cost.sea_template,seaUsesVolume=cost.sea_volumetric_weight_kg>cost.sea_actual_weight_kg;const warnings=optimization.warnings||[];$('output').innerHTML=`<div class="result"><div class="metric"><div class="label">海运费</div><div class="value">${money(cost.sea_freight_usd)}</div></div><div class="metric"><div class="label">配置费</div><div class="value">${money(cost.placement_fee_usd)}</div></div><div class="metric"><div class="label">FBA 配送费</div><div class="value">${money(cost.fba.total_fba_fee_usd)}</div></div><div class="metric total"><div class="label">三项合计</div><div class="value">${money(cost.total_usd)}</div></div></div><div class="detail"><span class="tier">${p.tier}</span><div class="rows"><div class="row"><span>实重</span><b>${cost.sea_actual_weight_kg.toFixed(2)} kg</b></div><div class="row"><span>体积重</span><b>${cost.sea_volumetric_weight_kg.toFixed(2)} kg</b></div><div class="row"><span>海运计费重</span><b>${cost.sea_chargeable_weight_kg.toFixed(2)} kg（${seaUsesVolume?'体积重':'实重'}）</b></div><div class="row"><span>体积重除数</span><b>${cost.sea_volume_divisor_cm3_per_kg} cm³/kg</b></div><div class="row"><span>海运模板</span><b>${t.name}</b></div><div class="row"><span>仓库 / 时效</span><b>${t.warehouse} / ${t.transit}</b></div><div class="row"><span>海运单价</span><b>$${cost.sea_rate_per_kg_usd.toFixed(2)}/kg</b></div><div class="row"><span>FBA 计费重</span><b>${p.shippingLb.toFixed(2)} lb</b></div><div class="row"><span>FBA 基础费 + 3.5%</span><b>${money(cost.fba.base_fee_usd)} + ${money(cost.fba.fuel_logistics_surcharge_usd)}</b></div></div>${cost.note?`<div class="notice bad">${cost.note}</div>`:''}${warnings.length?`<div class="notice"><b>尺寸优化建议</b><ul>${warnings.map(w=>`<li>${w}</li>`).join('')}</ul></div>`:'<div class="notice good">当前未触发 18in、50lb、130in 围长或 96in 的尺寸临界预警。</div>'}</div>`}
async function run(){const button=$('calc');button.disabled=true;button.textContent='计算中…';try{const input=args(),[cost,optimization]=await Promise.all([invoke('calculate_fba_cost',input),invoke('optimize_fba_dimensions',input)]);render(cost,optimization)}catch(error){$('output').innerHTML=`<div class="notice bad">${error.message}</div>`}finally{button.disabled=false;button.textContent='计算费用并优化尺寸'}}
$('calc').onclick=run;run();
</script>
</body>
</html>
