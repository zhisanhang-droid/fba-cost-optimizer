<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FBA 总费用与尺寸优化工具</title>
  <style>
    :root{--bg:#0b1120;--panel:#121b2f;--line:#263655;--muted:#a9b7d0;--text:#f4f7ff;--blue:#63a4ff;--good:#35d07f;--warn:#ffb84d;--bad:#ff7070}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(145deg,#0b1120,#111c34);color:var(--text);font:15px/1.5 system-ui,-apple-system,"Microsoft YaHei",sans-serif}
    main{max-width:1120px;margin:auto;padding:30px 18px 50px}.intro{margin-bottom:18px}.intro h1{margin:0 0 6px;font-size:28px}.intro p{margin:0;color:var(--muted)}
    .grid{display:grid;grid-template-columns:370px 1fr;gap:18px}.card{background:rgba(18,27,47,.95);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 12px 35px #02081655}.card h2{font-size:17px;margin:0 0 14px}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}label{font-size:13px;color:var(--muted);display:block;margin-bottom:5px}input,select{width:100%;background:#0d1629;color:var(--text);border:1px solid #314362;border-radius:8px;padding:10px;font:inherit}input:focus,select:focus{outline:2px solid #477fcf;border-color:transparent}button{width:100%;border:0;border-radius:9px;padding:12px;background:var(--blue);color:#071223;font-weight:800;font-size:15px;cursor:pointer;margin-top:5px}.hint{font-size:12px;color:var(--muted);margin:12px 0 0}.result{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.metric{border:1px solid var(--line);border-radius:10px;padding:12px;background:#0d1628}.metric .label{color:var(--muted);font-size:12px}.metric .value{font-size:22px;font-weight:750;margin-top:3px}.metric.total{border-color:#487ac6;background:#132342}.metric.total .value{color:#9bc4ff}.detail{margin-top:16px;border-top:1px solid var(--line);padding-top:16px}.rows{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 18px}.row{display:flex;justify-content:space-between;gap:10px;border-bottom:1px dashed #263655;padding:7px 0;color:var(--muted)}.row b{color:var(--text);text-align:right}.tier{display:inline-block;padding:4px 9px;border-radius:999px;font-weight:700;font-size:13px;background:#183457;color:#a9ceff}.notice{border-left:4px solid var(--warn);background:#2b2417;padding:12px 14px;border-radius:7px;margin-top:14px}.notice.good{border-color:var(--good);background:#102b23}.notice.bad{border-color:var(--bad);background:#321e27}.notice ul{margin:7px 0 0;padding-left:19px}.source{margin-top:20px;color:var(--muted);font-size:12px}.source a{color:#8ec0ff}@media(max-width:820px){.grid{grid-template-columns:1fr}.result{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
<main>
  <section class="intro"><h1>FBA 总费用与尺寸优化工具</h1><p>输入单件包装后的长、宽、高和重量，计算海运费、入库配置费、FBA 配送费及合计；同时检查 18 inch、50 lb、130 inch 围长等敏感临界点。</p></section>
  <div class="grid">
    <section class="card"><h2>输入参数（单件）</h2>
      <div class="form">
        <div><label>长</label><input id="length" type="number" min="0" step="0.01" value="17"></div>
        <div><label>宽</label><input id="width" type="number" min="0" step="0.01" value="13"></div>
        <div><label>高</label><input id="height" type="number" min="0" step="0.01" value="7"></div>
        <div><label>尺寸单位</label><select id="dimUnit"><option value="in">英寸（in）</option><option value="cm">厘米（cm）</option></select></div>
        <div><label>实际重量</label><input id="weight" type="number" min="0" step="0.01" value="3"></div>
        <div><label>重量单位</label><select id="weightUnit"><option value="lb">磅（lb）</option><option value="kg">千克（kg）</option></select></div>
        <div><label>售价（USD）</label><input id="price" type="number" min="0" step="0.01" value="29.99"></div>
        <div><label>配送费季节</label><select id="season"><option value="regular">非旺季</option><option value="peak">旺季（10/15–1/14）</option></select></div>
        <div class="full"><label>入库方案</label><select id="placement"><option value="single">单点入仓（按文档中最高配置费）</option><option value="split">部分货件拆分（大件，最高配置费）</option><option value="optimized">亚马逊优化货件拆分（文档标示无费用）</option></select></div>
        <div class="full"><button id="calc">计算费用并优化尺寸</button></div>
      </div>
      <p class="hint">提示：FBA 配送费必须按售价分为 &lt;$10、$10–$50、&gt;$50。海运按文档指定的美西 $1.50/kg，采用实际重量。</p>
    </section>
    <section class="card"><h2>计算结果</h2><div id="output"></div></section>
  </div>
  <p class="source">费率来源：<a href="https://ccn1l53zhme9.feishu.cn/docx/B0B2dKd7ioYnUhxMW5icRBJynIh" target="_blank">《亚马逊 FBA配送费+配置费用+海运费计算》</a>（读取版本 114）。估算仅覆盖“非服装类、常规 FBA 配送费”；特大号处理费及文档未列出的超过 50 lb 大件配置费需以 Amazon 实际账单复核。</p>
</main>
<script>
const $=id=>document.getElementById(id), money=n=>'$'+n.toFixed(2), ceil=(n,step)=>Math.ceil(n/step)*step;
function getInputs(){let d=[+$('length').value,+$('width').value,+$('height').value];if(d.some(x=>!isFinite(x)||x<=0)||!isFinite(+$('weight').value)||+$('weight').value<=0)throw Error('请填写大于 0 的长、宽、高和重量。');if($('dimUnit').value==='cm')d=d.map(x=>x/2.54);d.sort((a,b)=>b-a);let lb=+$('weight').value;if($('weightUnit').value==='kg')lb*=2.20462262;return {l:d[0],w:d[1],h:d[2],actualLb:lb,actualKg:lb/2.20462262,price:+$('price').value||0,season:$('season').value,placement:$('placement').value}}
function sizeInfo(x){const {l,w,h,actualLb}=x, girth=l+2*(w+h);let dim=(l*w*h)/139, volumetric=l*Math.max(w,2)*Math.max(h,2)/139;let tier, feeWeight;
  if(actualLb<=1 && l<=15&&w<=12&&h<=.75){tier='小号标准尺寸';feeWeight=actualLb;dim=null}
  else if(l<=18&&w<=14&&h<=8&&Math.max(actualLb,dim)<=20){tier='大号标准尺寸';feeWeight=Math.max(actualLb,dim)}
  else if(l<=37&&w<=28&&h<=20&&girth<=130&&Math.max(actualLb,volumetric)<=50){tier='小号大件';dim=volumetric;feeWeight=Math.max(actualLb,dim)}
  else if(l<=59&&w<=33&&h<=33&&girth<=130&&Math.max(actualLb,volumetric)<=50){tier='大号大件';dim=volumetric;feeWeight=Math.max(actualLb,dim)}
  else {feeWeight=actualLb>150?actualLb:Math.max(actualLb,volumetric);tier=feeWeight<=50?'超大件（0–50 lb）':feeWeight<=70?'超大件（50–70 lb）':feeWeight<=150?'超大件（70–150 lb）':'超大件（>150 lb）'}
  return {...x,girth,dim,feeWeight,tier,isSpecial:l>96||girth>130}
}
function priceCol(p){return p<10?0:p<=50?1:2}
const smallStdReg=[[2,2.43,3.32,3.58],[4,2.49,3.42,3.68],[6,2.56,3.45,3.71],[8,2.66,3.54,3.80],[10,2.77,3.68,3.94],[12,2.82,3.78,4.04],[14,2.92,3.91,4.17],[16,2.95,3.96,4.22]];
const largeStdReg=[[4,2.91,3.73,3.99],[8,3.13,3.95,4.21],[12,3.38,4.20,4.46],[16,3.78,4.60,4.86],[20,4.22,5.04,5.30],[24,4.60,5.42,5.68],[28,4.75,5.57,5.83],[32,5.00,5.82,6.08],[36,5.10,5.92,6.18],[40,5.28,6.10,6.36],[44,5.44,6.26,6.52],[48,5.85,6.67,6.93]];
const smallStdPeak=[[2,2.62,3.51,3.77],[4,2.68,3.61,3.87],[6,2.76,3.65,3.91],[8,2.86,3.74,4.00],[10,2.98,3.89,4.15],[12,3.03,3.99,4.25],[14,3.14,4.13,4.39],[16,3.17,4.18,4.44]];
const largeStdPeak=[[4,3.15,3.97,4.23],[8,3.39,4.21,4.47],[12,3.66,4.48,4.74],[16,4.07,4.89,5.15],[20,4.52,5.34,5.60],[24,4.91,5.73,5.99],[28,5.07,5.89,6.15],[32,5.33,6.15,6.41],[36,5.47,6.29,6.55],[40,5.67,6.49,6.75],[44,5.84,6.66,6.92],[48,6.26,7.08,7.34]];
function lookup(table,oz,col){return table.find(r=>oz<=r[0])[col+1]}
function fba(s){let c=priceCol(s.price), fw=s.feeWeight, oz=fw*16, peak=s.season==='peak', val, note=''; const table=peak?{ss:smallStdPeak,ls:largeStdPeak}:{ss:smallStdReg,ls:largeStdReg};
 if(s.tier==='小号标准尺寸')val=lookup(table.ss,oz,c);
 else if(s.tier==='大号标准尺寸'){if(oz<=48)val=lookup(table.ls,oz,c);else {let base=peak?[6.69,7.51,7.77][c]:[6.15,6.97,7.23][c];val=base+Math.ceil((oz-48)/4)*.08;note='超过 3 lb 的部分按每 4 oz 向上取整';}}
 else {let base, extra, start;if(s.tier==='小号大件'){base=peak?[7.82,8.59,8.59][c]:[6.78,7.55,7.55][c];extra=.38;start=1}
 else if(s.tier==='大号大件'){base=peak?[9.62,10.39,10.39][c]:[8.58,9.35,9.35][c];extra=.38;start=1}
 else if(s.tier==='超大件（0–50 lb）'){base=peak?[28.29,29.06,29.06][c]:[25.56,26.33,26.33][c];extra=.38;start=1}
 else if(s.tier==='超大件（50–70 lb）'){base=peak?[39.36,40.13,40.13][c]:[36.55,37.32,37.32][c];extra=.75;start=51}
 else if(s.tier==='超大件（70–150 lb）'){base=peak?[54.97,55.74,55.74][c]:[50.55,51.32,51.32][c];extra=.75;start=71}
 else {base=peak?[202.69,203.46,203.46][c]:[194.18,194.95,194.95][c];extra=.19;start=151}
 val=base+Math.max(0,Math.ceil(fw)-start)*extra;note='超过首重的部分按每 lb 向上取整';}
 const surcharge=val*.035;return {base:val,surcharge,total:val+surcharge,note}}
function config(s){if(s.tier==='小号标准尺寸'||s.tier==='大号标准尺寸'){let w=s.feeWeight;let max=s.tier==='小号标准尺寸'?(w<=.5?.32:.32):w<=.75?.40:w<=1.5?.50:w<=3?.60:w<=5?.76:w<=7?.98:w<=10?1.20:w<=15?1.50:1.90;return s.placement==='optimized'?0:max}
 if(s.tier==='小号大件'||s.tier==='大号大件'){let ranges=s.tier==='小号大件'?[[5,1.60,1.10],[12,2.40,1.75],[28,3.50,2.19],[42,4.95,2.83],[50,5.95,3.32]]:[[5,1.80,1.25],[12,2.90,1.80],[28,4.10,2.30],[42,5.60,2.95],[50,6.50,3.50]];let r=ranges.find(a=>s.feeWeight<=a[0]);if(!r)return null;return s.placement==='optimized'?0:s.placement==='split'?r[2]:r[1]}
 return null}
function optimization(s){let list=[],kind='good';const near=(v,limit)=>v>limit-.5&&v<=limit;
 if(s.tier==='小号标准尺寸')list.push('当前仍为小号标准尺寸；若要保留此段，包装需不超过 15 × 12 × 0.75 in、16 oz。');
 else if(s.l<=18&&s.w<=14&&s.h<=8&&s.feeWeight<=20)list.push('可维持标准尺寸。为抵御亚马逊复测误差，建议包装目标不超过 17.5 × 13.5 × 7.5 in，而不是刚好卡在 18 × 14 × 8。');
 else if(s.l<=37&&s.w<=28&&s.h<=20&&s.girth<=130&&s.feeWeight<=50)list.push('已进入小号大件。若能把最长边压回 ≤18 in、次长边 ≤14 in、最短边 ≤8 in，可能回到大号标准尺寸，费用级差通常很大。');
 else if(s.l<=59&&s.w<=33&&s.h<=33&&s.girth<=130&&s.feeWeight<=50)list.push('已进入大号大件。优先尝试把最长边压到 ≤37 in、次长边 ≤28 in、最短边 ≤20 in，以回到小号大件。');
 else list.push('已进入超大件。优先控制最长边 ≤59 in、次长边/最短边 ≤33 in、长度加围长 ≤130 in，且发货重量 ≤50 lb，才有机会回到大号大件。');
 if(near(s.l,18)||near(s.w,14)||near(s.h,8)){kind='notice';list.push('18 in 标准尺寸临界预警：当前至少一个边距阈值不足 0.5 in；建议留出 0.5 in 安全余量。')}
 if(s.actualLb>49||s.feeWeight>49){kind='notice';list.push(`50 lb 临界预警：当前计费重 ${s.feeWeight.toFixed(2)} lb。超过 50 lb 会切入“超大件 50–70 lb”；建议目标 ≤49.5 lb，并同时压低体积重。`)}
 if(s.girth>125){kind='notice';list.push(`围长临界预警：当前长度加围长 ${s.girth.toFixed(1)} in。130 in 是超大件/特大号的重要边界，建议至少留 5 in 余量。`)}
 if(s.l>91){kind='bad';list.push('96 in 临界预警：超过 96 in 会被视为特大号，可能另收特大号处理费；建议最长边控制在 95 in 以下。')}
 if(s.actualLb>145){kind='bad';list.push('150 lb 临界预警：超过 150 lb 后配送费口径改为仅实际重量，且费用显著上升。')}
 return {list,kind}
}
function run(){try{let s=sizeInfo(getInputs()),fb=fba(s),cf=config(s),sea=s.actualKg*1.5, total=sea+fb.total+(cf??0),opt=optimization(s);let dim=s.dim?`${s.dim.toFixed(2)} lb`:'不适用（按实际重）';$('output').innerHTML=`<div class="result"><div class="metric"><div class="label">海运费</div><div class="value">${money(sea)}</div></div><div class="metric"><div class="label">配置费</div><div class="value">${cf===null?'待核对':money(cf)}</div></div><div class="metric"><div class="label">FBA 配送费</div><div class="value">${money(fb.total)}</div></div><div class="metric total"><div class="label">三项合计</div><div class="value">${cf===null?'—':money(total)}</div></div></div><div class="detail"><span class="tier">${s.tier}</span><div class="rows"><div class="row"><span>排序后尺寸</span><b>${s.l.toFixed(2)} × ${s.w.toFixed(2)} × ${s.h.toFixed(2)} in</b></div><div class="row"><span>长度加围长</span><b>${s.girth.toFixed(2)} in</b></div><div class="row"><span>实际重量</span><b>${s.actualLb.toFixed(2)} lb / ${s.actualKg.toFixed(2)} kg</b></div><div class="row"><span>体积重量</span><b>${dim}</b></div><div class="row"><span>FBA 计费重</span><b>${s.feeWeight.toFixed(2)} lb</b></div><div class="row"><span>FBA 基础费 + 3.5%</span><b>${money(fb.base)} + ${money(fb.surcharge)}</b></div></div>${fb.note?`<p class="hint">计费取整：${fb.note}。</p>`:''}${cf===null?'<div class="notice bad">配置费表只给出了标准尺寸及 ≤50 lb 的小/大号大件。当前属于超大件，配置费未纳入合计，请按实际入库方案向货代或 Amazon 复核。</div>':''}<div class="notice ${opt.kind}"><b>尺寸优化建议</b><ul>${opt.list.map(x=>`<li>${x}</li>`).join('')}</ul></div></div>`}catch(e){$('output').innerHTML=`<div class="notice bad">${e.message}</div>`}}
$('calc').onclick=run;['length','width','height','weight','price','dimUnit','weightUnit','season','placement'].forEach(id=>$(id).addEventListener('change',run));run();
</script>
</body></html>
